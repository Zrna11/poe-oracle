<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoE Price Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#060504;color:#e0d8c0;font-family:'Cinzel',serif}
::-webkit-scrollbar{width:6px;background:#0a0806}
::-webkit-scrollbar-thumb{background:#2a2010;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

.glow{position:fixed;inset:0;pointer-events:none;
  background:radial-gradient(ellipse 70% 40% at 50% 0%,#c8a04408,transparent 70%)}

.wrap{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:24px 16px}

/* header */
.header{text-align:center;margin-bottom:28px}
.header .sub{font-size:10px;letter-spacing:5px;color:#4a3e28;margin-bottom:8px}
.header h1{font-size:30px;font-weight:700;letter-spacing:6px;color:#c8a044;
  text-shadow:0 0 30px #c8a04428}
.divider{width:120px;height:1px;background:linear-gradient(90deg,transparent,#c8a04440,transparent);
  margin:10px auto 0}

/* controls */
.controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.btn{background:transparent;border:1px solid #2a2010;color:#665a40;cursor:pointer;
  border-radius:2px;font-family:'Cinzel',serif;letter-spacing:1px;
  padding:6px 14px;font-size:10px;transition:all .2s}
.btn:hover{border-color:#c8a044;color:#c8a044}
.btn.active{background:#1a1008;border-color:#c8a044;color:#c8a044}
.league-wrap{display:flex;align-items:center;gap:8px;margin-left:auto}
.league-wrap span{font-size:10px;color:#665a40;letter-spacing:2px}
input{background:#0c0a06;border:1px solid #2a2010;color:#c8b880;
  padding:6px 10px;border-radius:2px;font-size:12px;font-family:monospace;
  outline:none;transition:border-color .2s}
input:focus{border-color:#c8a04460}

/* api key banner */
.apikey-banner{background:#08080e;border:1px solid #1a1a30;border-radius:3px;
  padding:10px 14px;margin-bottom:14px;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.apikey-banner span{font-size:10px;color:#5a5a90;letter-spacing:1px;white-space:nowrap}
.apikey-banner input{flex:1;min-width:200px;font-family:monospace;letter-spacing:1px}
.apikey-banner .save-btn{padding:5px 14px;font-size:10px;white-space:nowrap}

/* gfn banner */
.gfn-banner{background:#040d04;border:1px solid #162016;border-radius:3px;
  padding:9px 14px;margin-bottom:18px;font-family:'Crimson Pro',serif;
  font-size:13px;color:#4a7a4a;line-height:1.7}
.gfn-banner strong{color:#6aaa6a;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px}

/* paste area */
.paste-wrap{position:relative;margin-bottom:20px}
textarea{display:block;width:100%;background:#080604;border:1px solid #201808;
  color:#9a8860;padding:14px 16px;font-size:11px;font-family:monospace;
  resize:vertical;outline:none;border-radius:3px;line-height:1.7;
  transition:border-color .3s}
textarea:focus{border-color:#c8a04440}
textarea.busy{border-color:#c8a04435;box-shadow:0 0 0 1px #c8a04410 inset}
.analyse-btn{position:absolute;bottom:10px;right:10px;
  padding:6px 16px;font-size:10px;display:none}

/* spinner */
.spinner-wrap{text-align:center;padding:36px 0}
.spinner{width:36px;height:36px;margin:0 auto 14px;
  border:2px solid #1a1408;border-top-color:#c8a044;
  border-radius:50%;animation:spin 1s linear infinite}
.spinner-label{font-size:11px;letter-spacing:3px;color:#665a40;animation:pulse 2s ease infinite}

/* error */
.error-box{background:#0e0404;border:1px solid #3a1010;border-radius:3px;
  padding:10px 14px;color:#aa5555;font-size:13px;font-family:'Crimson Pro',serif;
  margin-bottom:16px}

/* results grid */
.results{display:grid;grid-template-columns:1fr 1fr;gap:16px;
  animation:fadeUp .35s ease both}
@media(max-width:620px){.results{grid-template-columns:1fr}}
.right-col{display:flex;flex-direction:column;gap:14px}

/* item card */
.item-card{border-radius:3px;overflow:hidden;font-family:'Crimson Pro',serif}
.item-header{padding:12px 16px;text-align:center}
.item-name{font-size:16px;font-weight:600;line-height:1.3}
.item-base{font-size:14px}
.item-rarity{font-size:9px;letter-spacing:2px;margin-top:3px;font-family:'Cinzel',serif}
.item-stats{display:flex;gap:16px;padding:8px 16px 4px;flex-wrap:wrap}
.item-stat{font-size:11px;color:#665a40}
.item-stat span{color:#a09060}
.item-mods{padding:10px 16px 14px}
.mod{font-size:13px;line-height:1.75}
.mod-divider{height:1px;margin:7px 0}
.corrupted{color:#cc4040;font-size:12px;margin-top:8px}

/* price card */
.price-card,.analysis-card{background:#080604;border:1px solid #201808;border-radius:3px;padding:16px}
.card-label{font-size:9px;letter-spacing:3px;color:#4a3e28;margin-bottom:12px}
.price-row{display:flex;gap:24px;align-items:flex-end;margin-bottom:12px}
.price-chaos{font-size:32px;font-weight:700;color:#c8a044;line-height:1}
.price-divine{font-size:22px;color:#d4a830}
.price-unit{font-size:9px;color:#4a3e28;margin-top:3px;letter-spacing:2px}
.price-meta{display:flex;gap:12px;font-size:10px;align-items:center;margin-bottom:14px}
.trade-btn{display:block;text-align:center;padding:7px 12px;font-size:10px;
  letter-spacing:2px;background:#0c0a06;border:1px solid #2a2010;
  color:#665a40;text-decoration:none;border-radius:2px;
  font-family:'Cinzel',serif;transition:all .2s}
.trade-btn:hover{border-color:#c8a044;color:#c8a044}

/* analysis card */
.analysis-card{font-family:'Crimson Pro',serif}
.analysis-summary{color:#a89870;font-size:14px;line-height:1.75;margin-bottom:14px}
.section-label{font-size:9px;letter-spacing:2px;margin-bottom:6px;font-family:'Cinzel',serif}
.mod-line{font-size:13px;line-height:1.65;display:flex;gap:6px}
.advice-box{background:#040d06;border:1px solid #162416;border-radius:2px;
  padding:10px 12px;color:#6aaa7a;font-size:13px;line-height:1.7;margin-top:10px}
</style>
</head>
<body>

<div class="glow"></div>
<div class="wrap">

  <!-- header -->
  <div class="header">
    <div class="sub">PATH OF EXILE</div>
    <h1>PRICE ORACLE</h1>
    <div class="divider"></div>
  </div>

  <!-- api key input -->
  <div class="apikey-banner" id="apiKeyBanner">
    <span>ANTHROPIC API KEY</span>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    <button class="btn save-btn" id="saveApiKey">SAVE</button>
    <span id="apiKeyStatus" style="font-size:10px;color:#4a7a4a;display:none">✓ saved</span>
  </div>

  <!-- controls -->
  <div class="controls">
    <button class="btn active" id="btnPoe1" onclick="setGame('poe1')">Path of Exile</button>
    <button class="btn"        id="btnPoe2" onclick="setGame('poe2')">Path of Exile 2</button>
    <div class="league-wrap">
      <span>LEAGUE</span>
      <input type="text" id="leagueInput" value="Standard" style="width:140px">
    </div>
  </div>

  <!-- gfn instructions -->
  <div class="gfn-banner">
    <strong>GEFORCE NOW →</strong>
    Open this page in the Steam overlay browser (Shift+Tab → Web Browser).
    Hover an item in-game → <strong>Ctrl+C</strong> → click into browser → <strong>Ctrl+V</strong>.
    Price check happens automatically.
  </div>

  <!-- paste area -->
  <div class="paste-wrap">
    <textarea id="itemTextarea" rows="6"
      placeholder="Hover an item in-game  →  Ctrl+C  →  Ctrl+V here&#10;&#10;Reads all item types: Unique · Rare · Currency · Gem · Divination Card...">
    </textarea>
    <button class="btn analyse-btn" id="analyseBtn" onclick="runAnalysis()">ANALYSE ↵</button>
  </div>

  <!-- status -->
  <div id="spinnerWrap" class="spinner-wrap" style="display:none">
    <div class="spinner"></div>
    <div class="spinner-label" id="spinnerLabel"></div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>

  <!-- results -->
  <div id="results" class="results" style="display:none">
    <div id="itemCard" class="item-card"></div>
    <div class="right-col">
      <div id="priceCard" class="price-card"></div>
      <div id="analysisCard" class="analysis-card" style="display:none"></div>
    </div>
  </div>

</div>

<script>
// ─── state ────────────────────────────────────────────────────────────────────
let currentGame = 'poe1';

const PAL = {
  'Normal':          {text:'#c8c8c8',bg:'#0e0e0e',border:'#3a3a3a'},
  'Magic':           {text:'#8888ff',bg:'#0a0a18',border:'#3a3a88'},
  'Rare':            {text:'#ffff77',bg:'#0f0f00',border:'#6a6a00'},
  'Unique':          {text:'#c07028',bg:'#100800',border:'#6b3a14'},
  'Currency':        {text:'#c09c5a',bg:'#100d00',border:'#5a4920'},
  'Gem':             {text:'#1ba29b',bg:'#001210',border:'#0d5c5a'},
  'Divination Card': {text:'#0ebaff',bg:'#00101a',border:'#0a5a7a'},
};

// ─── api key persistence ──────────────────────────────────────────────────────
(function initApiKey() {
  const saved = localStorage.getItem('poe_oracle_key') || '';
  if (saved) {
    document.getElementById('apiKeyInput').value = saved;
    document.getElementById('apiKeyStatus').style.display = 'inline';
    document.getElementById('apiKeyBanner').style.background = '#04080a';
    document.getElementById('apiKeyBanner').style.borderColor = '#0a1a20';
  }
})();

document.getElementById('saveApiKey').onclick = function() {
  const key = document.getElementById('apiKeyInput').value.trim();
  if (key) {
    localStorage.setItem('poe_oracle_key', key);
    document.getElementById('apiKeyStatus').style.display = 'inline';
    document.getElementById('apiKeyBanner').style.background = '#04080a';
    document.getElementById('apiKeyBanner').style.borderColor = '#0a1a20';
  }
};

function getApiKey() { return localStorage.getItem('poe_oracle_key') || ''; }

// ─── game toggle ──────────────────────────────────────────────────────────────
function setGame(g) {
  currentGame = g;
  document.getElementById('btnPoe1').className = 'btn' + (g==='poe1'?' active':'');
  document.getElementById('btnPoe2').className = 'btn' + (g==='poe2'?' active':'');
}

// ─── claude api ───────────────────────────────────────────────────────────────
async function callClaude(prompt) {
  const key = getApiKey();
  if (!key) throw new Error('Enter your Anthropic API key above first.');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:1000,
      messages:[{role:'user',content:prompt}]
    })
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error.message);
  return data.content?.[0]?.text || '';
}

function safeJSON(raw) {
  try { return JSON.parse(raw.replace(/```json\s*|```\s*/g,'').trim()); }
  catch { return null; }
}

// ─── poe.ninja ────────────────────────────────────────────────────────────────
async function ninjaLookup(parsed) {
  if (!parsed.ninjaType) return null;
  const league = document.getElementById('leagueInput').value || 'Standard';
  const base = currentGame === 'poe2' ? 'https://poe2.ninja' : 'https://poe.ninja';
  const isCurr = ['Currency','Fragment'].includes(parsed.ninjaType);
  const url = isCurr
    ? `${base}/api/data/currencyoverview?league=${encodeURIComponent(league)}&type=${parsed.ninjaType}`
    : `${base}/api/data/itemoverview?league=${encodeURIComponent(league)}&type=${parsed.ninjaType}`;
  try {
    const r = await fetch(url);
    if (!r.ok) return null;
    const json = await r.json();
    const lines = json.lines || [];
    const q = (parsed.name || parsed.base || '').toLowerCase();
    return lines.find(l=>(l.name||l.currencyTypeName||'').toLowerCase()===q)
        || lines.find(l=>(l.name||l.currencyTypeName||'').toLowerCase().includes(q))
        || null;
  } catch { return null; }
}

// ─── trade URL ────────────────────────────────────────────────────────────────
function buildTradeUrl(parsed) {
  const league = document.getElementById('leagueInput').value || 'Standard';
  const base = currentGame==='poe2'
    ? 'https://www.pathofexile.com/trade2/search'
    : 'https://www.pathofexile.com/trade/search';
  const q = {query:{status:{option:'online'}}};
  if (parsed.rarity==='Unique' && parsed.name) q.query.name = parsed.name;
  else if (parsed.base) q.query.type = parsed.base;
  return `${base}/${encodeURIComponent(league)}?q=${encodeURIComponent(JSON.stringify(q))}`;
}

// ─── number format ────────────────────────────────────────────────────────────
function fmtN(n, dp=0) {
  if (n==null||isNaN(n)) return '?';
  if (n>=1000) return `${(n/1000).toFixed(1)}k`;
  return n.toFixed(n<10?Math.max(dp,1):dp);
}

// ─── ui helpers ───────────────────────────────────────────────────────────────
function setPhase(phase) {
  const phases = {
    idle:      '',
    parsing:   'Reading the runes...',
    fetching:  'Consulting the markets...',
    analyzing: 'Divining the value...',
  };
  const spinner = document.getElementById('spinnerWrap');
  const label   = document.getElementById('spinnerLabel');
  const ta      = document.getElementById('itemTextarea');
  spinner.style.display = phase in phases && phase!=='idle' ? 'block' : 'none';
  label.textContent = phases[phase] || '';
  ta.className = (phase!=='idle'&&phase!=='done'&&phase!=='error') ? 'busy' : '';
  document.getElementById('errorBox').style.display = 'none';
  document.getElementById('results').style.display = 'none';
}

function showError(msg) {
  document.getElementById('errorBox').textContent = msg;
  document.getElementById('errorBox').style.display = 'block';
  setPhase('idle');
}

// ─── render helpers ───────────────────────────────────────────────────────────
function renderItemCard(item) {
  const pal = PAL[item.rarity] || PAL['Normal'];
  const el = document.getElementById('itemCard');
  el.style.background = pal.bg;
  el.style.border = `1px solid ${pal.border}`;

  const statsHtml = [
    item.ilvl    != null ? `<span class="item-stat">iLvl <span>${item.ilvl}</span></span>` : '',
    item.quality  >  0  ? `<span class="item-stat">Quality <span>${item.quality}%</span></span>` : '',
    item.links    >  1  ? `<span class="item-stat">Links <span>${item.links}</span></span>` : '',
    item.sockets        ? `<span class="item-stat">Sockets <span>${item.sockets}</span></span>` : '',
  ].filter(Boolean).join('');

  const implicitHtml = (item.implicitMods||[]).map(m=>
    `<div class="mod" style="color:#c0c0ff">${escHtml(m)}</div>`
  ).join('');

  const modsHtml = (item.mods||[]).map(m=>
    `<div class="mod" style="color:#8888ff">${escHtml(m)}</div>`
  ).join('');

  el.innerHTML = `
    <div class="item-header" style="background:${pal.border}28;border-bottom:1px solid ${pal.border}50">
      ${item.name ? `<div class="item-name" style="color:${pal.text}">${escHtml(item.name)}</div>` : ''}
      <div class="item-base" style="color:${pal.text}bb">${escHtml(item.base||'')}</div>
      <div class="item-rarity" style="color:${pal.text}55">${escHtml(item.rarity||'').toUpperCase()}</div>
    </div>
    ${statsHtml ? `<div class="item-stats">${statsHtml}</div>` : ''}
    <div class="item-mods">
      ${implicitHtml}
      ${implicitHtml && modsHtml ? `<div class="mod-divider" style="background:${pal.border}40"></div>` : ''}
      ${modsHtml}
      ${item.corrupted ? '<div class="corrupted">Corrupted</div>' : ''}
      ${!item.identified ? '<div class="corrupted">Unidentified</div>' : ''}
    </div>
  `;
}

function renderPriceCard(ninja, ai, parsed) {
  const chaos  = ninja?.chaosValue ?? ninja?.chaosEquivalent ?? ai?.chaosEstimate;
  const divine = ninja?.divineValue ?? ai?.divineEstimate;
  const listings = ninja?.listingCount;
  const conf   = ai?.confidence || (ninja ? 'high' : 'low');
  const src    = ninja ? 'poe.ninja' : 'AI estimate';
  const confColor = {high:'#6aaa6a',medium:'#c8a030',low:'#aa5555'}[conf] || '#888';
  const tradeUrl = buildTradeUrl(parsed);

  let priceHtml = '<div style="color:#4a3e28;font-size:13px;font-family:\'Crimson Pro\',serif">Price data unavailable</div>';
  if (chaos != null || divine != null) {
    priceHtml = `
      ${chaos != null ? `<div><div class="price-chaos">${fmtN(chaos, chaos<10?1:0)}</div><div class="price-unit">CHAOS ORBS</div></div>` : ''}
      ${divine != null ? `<div><div class="price-divine">${fmtN(divine, divine<1?2:1)}</div><div class="price-unit">DIVINE ORBS</div></div>` : ''}
    `;
  }

  document.getElementById('priceCard').innerHTML = `
    <div class="card-label">ESTIMATED VALUE</div>
    <div class="price-row">${priceHtml}</div>
    <div class="price-meta">
      <span style="color:${confColor}">● ${conf}</span>
      ${listings != null ? `<span style="color:#3a3020">${listings} listings</span>` : ''}
      <span style="color:#2a2010">${src}</span>
    </div>
    <a href="${tradeUrl}" target="_blank" class="trade-btn">SEARCH TRADE SITE ↗</a>
  `;
}

function renderAnalysisCard(ai) {
  if (!ai) return;
  const el = document.getElementById('analysisCard');
  el.style.display = 'block';

  const valuableMods = (ai.valuableMods||[]).map(m=>
    `<div class="mod-line"><span style="color:#4a7a4a;flex-shrink:0">+</span><span style="color:#6aaa7a">${escHtml(m)}</span></div>`
  ).join('');

  const weaknesses = (ai.weaknesses||[]).map(m=>
    `<div class="mod-line"><span style="color:#7a4a4a;flex-shrink:0">−</span><span style="color:#aa7070">${escHtml(m)}</span></div>`
  ).join('');

  el.innerHTML = `
    <div class="card-label">ORACLE'S JUDGEMENT</div>
    ${ai.summary ? `<p class="analysis-summary">${escHtml(ai.summary)}</p>` : ''}
    ${valuableMods ? `
      <div style="margin-bottom:12px">
        <div class="section-label" style="color:#4a7a4a">STRENGTHS</div>
        ${valuableMods}
      </div>` : ''}
    ${weaknesses ? `
      <div style="margin-bottom:10px">
        <div class="section-label" style="color:#7a4a4a">WEAKNESSES</div>
        ${weaknesses}
      </div>` : ''}
    ${ai.advice ? `<div class="advice-box">✦ ${escHtml(ai.advice)}</div>` : ''}
  `;
}

function escHtml(str) {
  return String(str||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── main analysis pipeline ───────────────────────────────────────────────────
async function runAnalysis(text) {
  text = text || document.getElementById('itemTextarea').value;
  if (!text || text.trim().length < 25) return;

  try {
    // 1 — parse
    setPhase('parsing');
    const league = document.getElementById('leagueInput').value || 'Standard';

    const parseRaw = await callClaude(`
Parse this Path of Exile item. Return ONLY valid compact JSON, zero markdown.

ITEM:
${text}

Schema:
{
  "name": string|null,
  "base": string,
  "rarity": "Normal"|"Magic"|"Rare"|"Unique"|"Currency"|"Gem"|"Divination Card",
  "implicitMods": string[],
  "mods": string[],
  "ilvl": number|null,
  "quality": number|null,
  "links": number|null,
  "sockets": string|null,
  "corrupted": boolean,
  "identified": boolean,
  "ninjaType": "UniqueWeapon"|"UniqueArmour"|"UniqueAccessory"|"UniqueFlask"|"UniqueJewel"|"DivinationCard"|"Currency"|"SkillGem"|null
}
    `);
    const parsed = safeJSON(parseRaw);
    if (!parsed?.base) throw new Error("Couldn't read the item. Make sure you copied the full item text.");

    // 2 — ninja
    setPhase('fetching');
    const ninja = await ninjaLookup(parsed);

    // 3 — analysis
    setPhase('analyzing');
    const analysisRaw = await callClaude(`
You are a Path of Exile economy expert. Analyse this item sharply and concisely.

ITEM TEXT:
${text}

PARSED: rarity=${parsed.rarity} base="${parsed.base}" name="${parsed.name||''}"
iLvl=${parsed.ilvl} quality=${parsed.quality} links=${parsed.links} corrupted=${parsed.corrupted}
Implicits: ${(parsed.implicitMods||[]).join(' | ')||'none'}
Mods: ${(parsed.mods||[]).join(' | ')||'none'}

POE.NINJA: ${ninja
  ? `chaos=${ninja.chaosValue??ninja.chaosEquivalent} divine=${ninja.divineValue??'-'} listings=${ninja.listingCount??'-'}`
  : 'not found (rare or unindexed)'}

Return ONLY valid JSON:
{
  "chaosEstimate": number|null,
  "divineEstimate": number|null,
  "confidence": "high"|"medium"|"low",
  "valuableMods": string[],
  "weaknesses": string[],
  "summary": "2-3 sentences",
  "advice": "1-2 sentences"
}
    `);
    const ai = safeJSON(analysisRaw) || {summary:'Analysis unavailable.',confidence:'low'};

    // render
    setPhase('done');
    renderItemCard(parsed);
    renderPriceCard(ninja, ai, parsed);
    renderAnalysisCard(ai);
    document.getElementById('results').style.display = 'grid';
    document.getElementById('spinnerWrap').style.display = 'none';

  } catch(e) {
    showError(e.message || 'Something went wrong.');
  }
}

// ─── paste handler ────────────────────────────────────────────────────────────
document.getElementById('itemTextarea').addEventListener('paste', function(e) {
  const txt = e.clipboardData?.getData('text') || '';
  if (txt.trim().length > 25) {
    e.preventDefault();
    this.value = txt;
    runAnalysis(txt);
  }
});

document.getElementById('itemTextarea').addEventListener('input', function() {
  const btn = document.getElementById('analyseBtn');
  btn.style.display = this.value.trim().length > 25 ? 'block' : 'none';
});
</script>
</body>
</html>
