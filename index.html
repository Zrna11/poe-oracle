<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PoE Price Oracle</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:#0a0806;color:#f0e8d0;font-family:'Cinzel',serif}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

.page{max-width:860px;margin:0 auto;padding:20px 16px}

.hdr{text-align:center;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #4a3a18}
.hdr-sub{font-size:9px;letter-spacing:6px;color:#8a7a50;margin-bottom:6px}
.hdr-title{font-size:28px;font-weight:700;letter-spacing:5px;color:#f0c040;text-shadow:0 0 24px #c8a04440}
.hdr-line{width:100px;height:1px;background:linear-gradient(90deg,transparent,#c8a044,transparent);margin:8px auto 0}

.api-row{display:flex;gap:8px;align-items:center;margin-bottom:12px;
  background:#141008;border:2px solid #4a3a18;border-radius:4px;padding:10px 12px;flex-wrap:wrap}
.api-label{font-size:10px;letter-spacing:2px;color:#c8a044;white-space:nowrap;flex-shrink:0}
.api-input{flex:1;min-width:220px;background:#1c1608;border:1px solid #6a5428;
  color:#f0e8d0;padding:7px 10px;border-radius:3px;font-family:monospace;font-size:12px;outline:none}
.api-input:focus{border-color:#c8a044}
.api-save{background:#2a1e08;border:2px solid #c8a044;color:#f0c040;
  padding:7px 18px;border-radius:3px;cursor:pointer;font-family:'Cinzel',serif;
  font-size:10px;letter-spacing:2px;transition:all .2s}
.api-save:hover{background:#3a2e10;color:#fff}
.api-ok{font-size:11px;color:#6acc6a;display:none;margin-left:4px}

.league-row{display:flex;gap:12px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.league-label{font-size:10px;letter-spacing:2px;color:#c8a044}
.league-select{background:#141008;border:2px solid #4a3a18;color:#f0e8d0;
  padding:8px 12px;border-radius:3px;font-size:13px;outline:none;min-width:190px;
  cursor:pointer;transition:border-color .2s;font-family:'Cinzel',serif}
.league-select:focus{border-color:#c8a044}
.league-select option{background:#1a1208;color:#f0e8d0}
.league-hint{font-size:11px;color:#7a6a40;font-family:'Crimson Pro',serif}

.gfn-box{background:#081408;border:2px solid #2a4a2a;border-radius:4px;
  padding:12px 16px;margin-bottom:16px}
.gfn-title{font-size:10px;letter-spacing:3px;color:#6acc6a;margin-bottom:8px}
.gfn-steps{font-family:'Crimson Pro',serif;font-size:14px;color:#a0c8a0;line-height:2}
.gfn-steps strong{color:#c8f0c8;font-family:'Cinzel',serif;font-size:11px;letter-spacing:1px}

.paste-label{font-size:10px;letter-spacing:2px;color:#c8a044;margin-bottom:8px}
#itemText{width:100%;display:block;background:#0e0c08;border:2px solid #4a3a18;
  border-radius:4px;color:#e8ddb8;padding:14px;font-family:monospace;font-size:12px;
  line-height:1.7;resize:vertical;outline:none;min-height:120px;transition:border-color .3s}
#itemText:focus{border-color:#c8a044;box-shadow:0 0 0 1px #c8a04420}
#itemText::placeholder{color:#4a3a18;font-family:'Crimson Pro',serif;font-size:13px}

.check-btn{display:block;width:100%;margin-top:10px;background:#1e1608;
  border:2px solid #c8a044;color:#f0c040;padding:13px;border-radius:4px;
  cursor:pointer;font-family:'Cinzel',serif;font-size:12px;letter-spacing:3px;transition:all .2s}
.check-btn:hover:not(:disabled){background:#2a2010;border-color:#f0c040;color:#fff}
.check-btn:disabled{opacity:.35;cursor:not-allowed;border-color:#3a2a10;color:#7a6030}

.status-box{text-align:center;padding:32px;display:none}
.spinner{width:34px;height:34px;border:3px solid #2a2010;border-top-color:#c8a044;
  border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 14px}
.status-lbl{font-size:11px;letter-spacing:3px;color:#c8a044}

.err-box{background:#1a0505;border:2px solid #882020;border-radius:4px;
  padding:12px 16px;color:#ff9090;font-family:'Crimson Pro',serif;
  font-size:14px;margin-bottom:16px;display:none;line-height:1.7}

.results{display:none;animation:fadeUp .35s ease}
.res-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:600px){.res-grid{grid-template-columns:1fr}}

.item-card{border-radius:4px;overflow:hidden}
.item-hdr{padding:12px 16px;text-align:center}
.item-name{font-size:16px;font-weight:700;line-height:1.3;margin-bottom:3px}
.item-base{font-size:14px;font-family:'Crimson Pro',serif;font-weight:400;margin-bottom:3px}
.item-rar{font-size:9px;letter-spacing:3px}
.item-stats{display:flex;gap:16px;padding:8px 16px;flex-wrap:wrap}
.istat{font-size:11px;color:#9a8860}
.istat b{color:#d4c090;font-weight:400}
.item-mods{padding:10px 16px 14px;font-family:'Crimson Pro',serif}
.mod{font-size:13px;line-height:1.8}
.sep{height:1px;margin:8px 0}
.corrupt{color:#ff7070;font-size:12px;margin-top:8px}

.price-card,.anlys-card{background:#0e0c08;border:2px solid #4a3a18;border-radius:4px;padding:16px}
.card-ttl{font-size:9px;letter-spacing:3px;color:#c8a044;margin-bottom:14px}
.pvals{display:flex;gap:24px;align-items:flex-end;margin-bottom:12px}
.pchaos{font-size:36px;font-weight:700;color:#f0c040;line-height:1}
.pdivine{font-size:24px;color:#e0a030}
.punit{font-size:9px;color:#7a6040;margin-top:4px;letter-spacing:2px}
.pmeta{display:flex;gap:12px;font-size:11px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.ch{color:#6acc6a}.cm{color:#d4a030}.cl{color:#cc5555}
.psrc{color:#5a4a28}
.trade-a{display:block;text-align:center;padding:10px;font-size:10px;letter-spacing:3px;
  background:#141008;border:2px solid #4a3a18;color:#c8a044;
  text-decoration:none;border-radius:3px;font-family:'Cinzel',serif;transition:all .2s}
.trade-a:hover{border-color:#c8a044;color:#f0c040;background:#1e1608}

.anlys-card{font-family:'Crimson Pro',serif}
.asumm{color:#d4c090;font-size:14px;line-height:1.8;margin-bottom:14px}
.asect{margin-bottom:12px}
.asect-ttl{font-family:'Cinzel',serif;font-size:9px;letter-spacing:2px;margin-bottom:7px}
.amod{font-size:13px;line-height:1.65;display:flex;gap:6px;margin-bottom:3px}
.advice{background:#081408;border:2px solid #1a4a1a;border-radius:3px;
  padding:10px 12px;color:#88cc88;font-size:13px;line-height:1.7;margin-top:10px}
</style>
</head>
<body>
<div class="page">

  <div class="hdr">
    <div class="hdr-sub">PATH OF EXILE</div>
    <div class="hdr-title">PRICE ORACLE</div>
    <div class="hdr-line"></div>
  </div>

  <div class="api-row" id="apiRow">
    <span class="api-label">ANTHROPIC API KEY</span>
    <input class="api-input" type="password" id="apiKey" placeholder="sk-ant-api03-...">
    <button class="api-save" onclick="saveKey()">SAVE</button>
    <span class="api-ok" id="apiOk">✓ key saved</span>
  </div>

  <div class="league-row">
    <span class="league-label">LEAGUE</span>
    <select class="league-select" id="leagueInput"><option>Loading leagues...</option></select>
    <span class="league-hint" id="leagueHint">Fetching current leagues…</span>
  </div>

  <div class="gfn-box">
    <div class="gfn-title">GEFORCE NOW — HOW TO USE</div>
    <div class="gfn-steps">
      <strong>1.</strong> Hover item in-game → press <strong>Ctrl+C</strong><br>
      <strong>2.</strong> Press <strong>Shift+Tab</strong> → Web Browser → navigate here<br>
      <strong>3.</strong> Click the text box below to focus it<br>
      <strong>4.</strong> Press <strong>Ctrl+V</strong> — analysis starts automatically
    </div>
  </div>

  <div style="margin-bottom:18px">
    <div class="paste-label">ITEM TEXT</div>
    <textarea id="itemText" rows="6"
      placeholder="Click here first, then Ctrl+V to paste your item text..."></textarea>
    <button class="check-btn" id="checkBtn" onclick="tryAnalyse()" disabled>
      PASTE &amp; CHECK PRICE
    </button>
  </div>

  <div class="status-box" id="statusBox">
    <div class="spinner"></div>
    <div class="status-lbl" id="statusLbl"></div>
  </div>

  <div class="err-box" id="errBox"></div>

  <div class="results" id="results">
    <div class="res-grid">
      <div id="itemCard" class="item-card"></div>
      <div style="display:flex;flex-direction:column;gap:14px">
        <div id="priceCard" class="price-card"></div>
        <div id="anlysCard" class="anlys-card" style="display:none"></div>
      </div>
    </div>
  </div>

</div>
<script>
const PAL={
  Normal:          {t:'#d0d0d0',bg:'#0e0e0e',b:'#505050'},
  Magic:           {t:'#aaaaff',bg:'#0c0c1e',b:'#5050bb'},
  Rare:            {t:'#ffff88',bg:'#121200',b:'#909000'},
  Unique:          {t:'#e08030',bg:'#140a00',b:'#804020'},
  Currency:        {t:'#d0b060',bg:'#130e00',b:'#706030'},
  Gem:             {t:'#20c8c0',bg:'#001816',b:'#107070'},
  'Divination Card':{t:'#30d0ff',bg:'#00141c',b:'#107090'},
};

async function fetchLeagues(){
  const hint=document.getElementById('leagueHint');
  const sel=document.getElementById('leagueInput');
  try{
    const r=await fetch('https://api.pathofexile.com/leagues?type=main&compact=1');
    const data=await r.json();
    const leagues=(Array.isArray(data)?data:data.result||[])
      .map(l=>typeof l==='string'?l:l.id)
      .filter(l=>l&&!l.includes('SSF')&&!l.includes('Ruthless'));
    sel.innerHTML='';
    // put temp leagues first (not Standard/Hardcore)
    const temp=leagues.filter(l=>l!=='Standard'&&l!=='Hardcore');
    const perm=leagues.filter(l=>l==='Standard'||l==='Hardcore');
    [...temp,...perm].forEach(l=>{
      const o=document.createElement('option');
      o.value=l;o.textContent=l;sel.appendChild(o);
    });
    hint.textContent=`${leagues.length} leagues loaded`;
    hint.style.color='#6acc6a';
  }catch(err){
    sel.innerHTML='<option value="Standard">Standard</option><option value="Hardcore">Hardcore</option>';
    hint.textContent='Could not fetch leagues — enter manually';
    hint.style.color='#cc8844';
    // make it editable as fallback
    sel.outerHTML='<input class="league-select" type="text" id="leagueInput" value="Standard" placeholder="e.g. Settlers">';
  }
}
const API_KEY='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';
window.onload=function(){
  localStorage.setItem('poe_oracle_key',API_KEY);
  document.getElementById('apiRow').style.display='none';
  fetchLeagues();
  const ta=document.getElementById('itemText');
  ta.focus();
  ta.addEventListener('input',onInput);
  ta.addEventListener('paste',onPaste);
  document.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='v') ta.focus();
  });
};

function saveKey(){
  const k=document.getElementById('apiKey').value.trim();
  if(!k)return;
  localStorage.setItem('poe_oracle_key',k);
  document.getElementById('apiOk').style.display='inline';
}
function onInput(){
  document.getElementById('checkBtn').disabled=document.getElementById('itemText').value.trim().length<20;
}
function onPaste(){
  setTimeout(function(){
    const v=document.getElementById('itemText').value.trim();
    if(v.length>20){document.getElementById('checkBtn').disabled=false;tryAnalyse();}
  },100);
}
function tryAnalyse(){
  const t=document.getElementById('itemText').value.trim();
  if(t.length>20)analyse(t);
}

async function claude(prompt){
  const k=localStorage.getItem('poe_oracle_key');
  if(!k)throw new Error('No API key saved. Enter your Anthropic API key above and click SAVE first.');
  const r=await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':k,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
    body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content?.[0]?.text||'';
}
function pj(raw){
  try{return JSON.parse(raw.replace(/```json\s*|```\s*/g,'').trim());}catch{return null;}
}

async function ninjaLookup(parsed){
  if(!parsed.ninjaType)return null;
  const league=document.getElementById('leagueInput').value.trim()||'Standard';
  const isCurr=['Currency','Fragment'].includes(parsed.ninjaType);
  const url=isCurr
    ?`https://poe.ninja/api/data/currencyoverview?league=${encodeURIComponent(league)}&type=${parsed.ninjaType}`
    :`https://poe.ninja/api/data/itemoverview?league=${encodeURIComponent(league)}&type=${parsed.ninjaType}`;
  try{
    const r=await fetch(url);if(!r.ok)return null;
    const j=await r.json();const lines=j.lines||[];
    const q=(parsed.name||parsed.base||'').toLowerCase();
    return lines.find(l=>(l.name||l.currencyTypeName||'').toLowerCase()===q)
        ||lines.find(l=>(l.name||l.currencyTypeName||'').toLowerCase().includes(q))
        ||null;
  }catch{return null;}
}

function tradeUrl(p){
  const league=document.getElementById('leagueInput').value.trim()||'Standard';
  const q={query:{status:{option:'online'}}};
  if(p.rarity==='Unique'&&p.name)q.query.name=p.name;
  else if(p.base)q.query.type=p.base;
  return`https://www.pathofexile.com/trade/search/${encodeURIComponent(league)}?q=${encodeURIComponent(JSON.stringify(q))}`;
}

function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fn(n,dp=0){
  if(n==null||isNaN(+n))return'?';n=+n;
  if(n>=1000)return`${(n/1000).toFixed(1)}k`;
  return n.toFixed(n<10?Math.max(dp,1):dp);
}

function setPhase(phase){
  const labels={parsing:'Reading the runes…',fetching:'Consulting the markets…',analyzing:'Divining the value…'};
  document.getElementById('statusBox').style.display=phase?'block':'none';
  document.getElementById('statusLbl').textContent=labels[phase]||'';
  document.getElementById('errBox').style.display='none';
  document.getElementById('results').style.display='none';
}
function showErr(msg){
  setPhase(null);
  const b=document.getElementById('errBox');b.textContent=msg;b.style.display='block';
}

function renderItem(item){
  const p=PAL[item.rarity]||PAL.Normal;
  const el=document.getElementById('itemCard');
  el.style.background=p.bg;el.style.border=`2px solid ${p.b}`;
  const stats=[
    item.ilvl!=null?`<span class="istat">iLvl <b>${item.ilvl}</b></span>`:'',
    item.quality>0?`<span class="istat">Quality <b>${item.quality}%</b></span>`:'',
    item.links>1?`<span class="istat">Links <b>${item.links}</b></span>`:'',
    item.sockets?`<span class="istat">Sockets <b>${e(item.sockets)}</b></span>`:'',
  ].filter(Boolean).join('');
  const imps=(item.implicitMods||[]).map(m=>`<div class="mod" style="color:#c0c0ff">${e(m)}</div>`).join('');
  const mods=(item.mods||[]).map(m=>`<div class="mod" style="color:#aaaaff">${e(m)}</div>`).join('');
  el.innerHTML=`
    <div class="item-hdr" style="background:${p.b}30;border-bottom:2px solid ${p.b}60">
      ${item.name?`<div class="item-name" style="color:${p.t}">${e(item.name)}</div>`:''}
      <div class="item-base" style="color:${p.t}bb">${e(item.base||'')}</div>
      <div class="item-rar" style="color:${p.t}88">${e(item.rarity||'').toUpperCase()}</div>
    </div>
    ${stats?`<div class="item-stats" style="border-bottom:1px solid ${p.b}40">${stats}</div>`:''}
    <div class="item-mods">
      ${imps}
      ${imps&&mods?`<div class="sep" style="background:${p.b}50"></div>`:''}
      ${mods}
      ${item.corrupted?'<div class="corrupt">Corrupted</div>':''}
      ${!item.identified?'<div class="corrupt">Unidentified</div>':''}
    </div>`;
}

function renderPrice(ninja,ai,parsed){
  const chaos=ninja?.chaosValue??ninja?.chaosEquivalent??ai?.chaosEstimate;
  const divine=ninja?.divineValue??ai?.divineEstimate;
  const listings=ninja?.listingCount;
  const conf=ai?.confidence||(ninja?'high':'low');
  const src=ninja?'poe.ninja':'AI estimate';
  let ph='<span style="color:#6a5a30;font-family:\'Crimson Pro\',serif;font-size:14px">No price data found</span>';
  if(chaos!=null||divine!=null){
    ph=`${chaos!=null?`<div><div class="pchaos">${fn(chaos,chaos<10?1:0)}</div><div class="punit">CHAOS ORBS</div></div>`:''}
        ${divine!=null?`<div><div class="pdivine">${fn(divine,divine<1?2:1)}</div><div class="punit">DIVINE ORBS</div></div>`:''}`;
  }
  document.getElementById('priceCard').innerHTML=`
    <div class="card-ttl">ESTIMATED VALUE</div>
    <div class="pvals">${ph}</div>
    <div class="pmeta">
      <span class="c${conf[0]}"">● ${conf} confidence</span>
      ${listings!=null?`<span style="color:#6a5a30">${listings} listings</span>`:''}
      <span class="psrc">${src}</span>
    </div>
    <a class="trade-a" href="${tradeUrl(parsed)}" target="_blank">OPEN ON TRADE SITE ↗</a>`;
}

function renderAnalysis(ai){
  if(!ai)return;
  const el=document.getElementById('anlysCard');el.style.display='block';
  const vm=(ai.valuableMods||[]).map(m=>`<div class="amod"><span style="color:#4a8a4a">+</span><span style="color:#88cc88">${e(m)}</span></div>`).join('');
  const wm=(ai.weaknesses||[]).map(m=>`<div class="amod"><span style="color:#8a4a4a">−</span><span style="color:#cc8888">${e(m)}</span></div>`).join('');
  el.innerHTML=`
    <div class="card-ttl">ORACLE'S JUDGEMENT</div>
    ${ai.summary?`<p class="asumm">${e(ai.summary)}</p>`:''}
    ${vm?`<div class="asect"><div class="asect-ttl" style="color:#4a8a4a">STRENGTHS</div>${vm}</div>`:''}
    ${wm?`<div class="asect"><div class="asect-ttl" style="color:#8a4a4a">WEAKNESSES</div>${wm}</div>`:''}
    ${ai.advice?`<div class="advice">✦ ${e(ai.advice)}</div>`:''}`;
}

async function analyse(text){
  try{
    setPhase('parsing');
    const parseRaw=await claude(`Parse this Path of Exile item text. Return ONLY valid JSON, no markdown.

ITEM:
${text}

Return exactly:
{
  "name": string or null,
  "base": string,
  "rarity": "Normal"|"Magic"|"Rare"|"Unique"|"Currency"|"Gem"|"Divination Card",
  "implicitMods": [],
  "mods": [],
  "ilvl": number or null,
  "quality": number or null,
  "links": number or null,
  "sockets": string or null,
  "corrupted": boolean,
  "identified": boolean,
  "ninjaType": "UniqueWeapon"|"UniqueArmour"|"UniqueAccessory"|"UniqueFlask"|"UniqueJewel"|"DivinationCard"|"Currency"|"SkillGem"|null
}`);
    const parsed=pj(parseRaw);
    if(!parsed?.base)throw new Error('Could not read item. Make sure you Ctrl+C directly over the item tooltip in-game.');

    setPhase('fetching');
    const ninja=await ninjaLookup(parsed);

    setPhase('analyzing');
    const aiRaw=await claude(`You are a Path of Exile economy expert. Analyse this item.

ITEM:
${text}

PARSED:
Rarity: ${parsed.rarity}, Base: ${parsed.base}, Name: ${parsed.name||'N/A'}
Implicits: ${(parsed.implicitMods||[]).join(' | ')||'none'}
Mods: ${(parsed.mods||[]).join(' | ')||'none'}
iLvl: ${parsed.ilvl}, Quality: ${parsed.quality}%, Links: ${parsed.links}, Corrupted: ${parsed.corrupted}

POE.NINJA:
${ninja?`Chaos: ${ninja.chaosValue??ninja.chaosEquivalent}, Divine: ${ninja.divineValue??'N/A'}, Listings: ${ninja.listingCount??'N/A'}`:'Not indexed (likely rare item or base type)'}

Return ONLY valid JSON:
{
  "chaosEstimate": number or null,
  "divineEstimate": number or null,
  "confidence": "high"|"medium"|"low",
  "valuableMods": [],
  "weaknesses": [],
  "summary": "2-3 sentences about item value",
  "advice": "1-2 sentence trade tip"
}`);
    const ai=pj(aiRaw)||{summary:'Analysis unavailable.',confidence:'low'};

    setPhase(null);
    renderItem(parsed);renderPrice(ninja,ai,parsed);renderAnalysis(ai);
    document.getElementById('results').style.display='block';
  }catch(err){
    showErr(err.message||'Something went wrong. Check API key and try again.');
  }
}
</script>
</body>
</html>
